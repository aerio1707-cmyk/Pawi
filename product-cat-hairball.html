<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓用天然排毛粉 - Pawi 派怡</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
            <div class="container">
                <div class="logo">
                    <a href="index.html"><img src="images/logo.png" alt="Pawi" class="brand-logo"></a>
                </div>
        
                <button class="menu-toggle" id="menuToggle" aria-label="切換選單">
                    <i class="fas fa-bars"></i>
                </button>

                <nav class="nav-menu" id="navMenu">
                <ul>
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="about.html">關於派怡</a></li>
                    <li><a href="index.html#products">營養品系列</a></li>
                    <li><a href="news.html">最新消息</a></li>
                </ul>
                </nav>
            </div>
     </header>

    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="container" style="padding: 60px 20px;">
        <div class="product-detail-grid" style="display: flex; flex-wrap: wrap; gap: 50px; align-items: flex-start;">
            <div class="product-gallery" style="flex: 1; min-width: 300px;">
                <div style="background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px;">
                    <img src="images/products/cat-hairball.jpg" alt="貓用天然排毛粉" style="width: 100%; height: auto;">
                </div>
            </div>

            <div class="product-purchase-box" style="flex: 1; min-width: 300px;">
                <span class="badge" style="background: #FFB347; color: #fff; padding: 5px 15px; border-radius: 20px;">貓咪推薦</span>
                <h1 style="font-size: 2rem; margin: 15px 0; color: var(--text-dark);">順暢無阻：貓用天然排毛粉</h1>
                <p style="color: #666; font-size: 1.1rem; margin-bottom: 25px;">天然洋車前子與荷蘭進口酵素，溫和排出體內毛球，不含礦物油，給貓咪最安心的化毛選擇。</p>
                
                <div class="price-box" style="margin-bottom: 30px;">
                    <span style="font-size: 2.2rem; color: var(--primary-orange); font-weight: bold;">NT$ 550</span>
                </div>

                <ul style="list-style: none; padding: 0; margin-bottom: 30px; line-height: 2;">
                    <li><i class="fas fa-check-circle" style="color: var(--primary-orange);"></i> 高纖維配方，增加飽足感</li>
                    <li><i class="fas fa-check-circle" style="color: var(--primary-orange);"></i> 排除毛球同時維護消化道健康</li>
                    <li><i class="fas fa-check-circle" style="color: var(--primary-orange);"></i> 貓咪最愛的淡雅雞肉香</li>
                </ul>

                <div class="quantity-cart-row" style="display:flex; align-items:center; gap:8px;">
                    <input type="number" value="1" min="1" id="qty-hairball">
                    <button class="btn-primary btn-add-cart" style="flex:1;"
                        data-id="cat-hairball"
                        data-name="貓用天然排毛粉"
                        data-price="550"
                        data-img="images/products/cat-hairball.jpg"
                        data-qty-input="qty-hairball">
                        <i class="fas fa-shopping-cart" style="margin-right:8px;"></i>加入購物車
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script src="js/main.js"></script>
    
    <!-- ======= 購物車側欄 ======= -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> 購物車</h3>
            <button class="cart-close" id="cartClose" aria-label="關閉購物車">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="cart-body" id="cartBody">
            <div class="cart-empty" id="cartEmpty">
                <i class="fas fa-box-open"></i>
                <p>購物車是空的</p>
            </div>
            <ul class="cart-item-list" id="cartItemList"></ul>
        </div>

        <div class="cart-footer" id="cartFooter" style="display:none;">
            <div class="cart-total">
                <span>合計</span>
                <span class="cart-total-price" id="cartTotalPrice">NT$ 0</span>
            </div>
            <button class="btn-primary cart-checkout-btn">
                <i class="fas fa-lock" style="margin-right:8px;"></i>前往結帳
            </button>
        </div>
    </aside>
    <!-- ======= /購物車側欄 ======= -->

    <script src="js/main.js"></script>
</body>
</html>
